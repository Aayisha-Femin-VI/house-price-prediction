<!DOCTYPE html>
<html>

<head>

    <title>Employee Salary Prediction</title>

    <style>

        body{
            margin:0;
            padding:0;
            background-color:#e6f2ff;
            font-family:Arial, sans-serif;
        }

        .container{
            width:400px;
            margin:auto;
            margin-top:80px;
            background-color:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:30px;
        }

        label{
            font-size:18px;
            color:#333;
        }

        input[type="number"]{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #999;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        input[type="submit"]{
            width:100%;
            padding:12px;
            background-color:#007BFF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        input[type="submit"]:hover{
            background-color:#0056b3;
        }

        .output{
            margin-top:25px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:green;
        }

        .error{
            margin-top:25px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:red;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Employee Salary Prediction System</h1>

        <form action="/predict" method="post">

            <label>Enter Age:</label>

            <input 
                type="number"
                name="age"
                min="18"
                max="60"
                step="any"
                placeholder="Enter age between 18 and 60"
                required
            >

            <label>Enter Experience:</label>

            <input 
                type="number"
                name="experience"
                min="0"
                max="40"
                step="any"
                placeholder="Enter experience"
                required
            >

            <input type="submit" value="Predict Salary">

        </form>

        {% if prediction_text %}

            {% if "must" in prediction_text or "Invalid" in prediction_text %}

                <div class="error">
                    {{ prediction_text }}
                </div>

            {% else %}

                <div class="output">
                    {{ prediction_text }}
                </div>

            {% endif %}

        {% endif %}

    </div>

</body>

</html>
