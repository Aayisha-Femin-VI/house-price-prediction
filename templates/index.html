<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container{
            background:white;
            width:400px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            border-color:#4facfe;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00c6fb;
        }

        .result{
            margin-top:20px;
            text-align:center;
            padding:15px;
            border-radius:10px;
            background:#f2f2f2;
            font-size:20px;
            font-weight:bold;
            color:#222;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🏠 House Price Prediction</h1>

        <form action="/predict" method="POST">

            <div class="input-group">
                <label>Overall Quality</label>
                <input type="number" name="OverallQual" required>
            </div>

            <div class="input-group">
                <label>Ground Living Area</label>
                <input type="number" name="GrLivArea" required>
            </div>

            <div class="input-group">
                <label>Garage Cars</label>
                <input type="number" name="GarageCars" required>
            </div>

            <div class="input-group">
                <label>Total Basement Area</label>
                <input type="number" name="TotalBsmtSF" required>
            </div>

            <div class="input-group">
                <label>Full Bathrooms</label>
                <input type="number" name="FullBath" required>
            </div>

            <div class="input-group">
                <label>Year Built</label>
                <input type="number" name="YearBuilt" required>
            </div>

            <button type="submit">Predict Price</button>

        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</body>

</html>
