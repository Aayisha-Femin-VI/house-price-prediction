<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            width:420px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:25px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#4facfe;
            box-shadow:0 0 5px rgba(79,172,254,0.5);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00c6fb;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#f0f8ff;
            border-radius:10px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:#222;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🏠 House Price Prediction</h1>

        <p class="subtitle">
            Predict house prices using Gradient Boosting Regression
        </p>

        <form action="/predict" method="POST">

            <div class="input-group">
                <label>Overall Quality</label>

                <input type="number"
                       name="OverallQual"
                       placeholder="Enter quality (1-10)"
                       required>
            </div>

            <div class="input-group">
                <label>Ground Living Area</label>

                <input type="number"
                       name="GrLivArea"
                       placeholder="Enter area in sq.ft"
                       required>
            </div>

            <div class="input-group">
                <label>Garage Cars</label>

                <input type="number"
                       name="GarageCars"
                       placeholder="Enter garage capacity"
                       required>
            </div>

            <div class="input-group">
                <label>Total Basement Area</label>

                <input type="number"
                       name="TotalBsmtSF"
                       placeholder="Enter basement area"
                       required>
            </div>

            <div class="input-group">
                <label>Full Bathrooms</label>

                <input type="number"
                       name="FullBath"
                       placeholder="Enter number of bathrooms"
                       required>
            </div>

            <div class="input-group">
                <label>Year Built</label>

                <input type="number"
                       name="YearBuilt"
                       placeholder="Enter construction year"
                       required>
            </div>

            <button type="submit">
                Predict Price
            </button>

        </form>

        {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

        {% endif %}

    </div>

</body>

</html>
